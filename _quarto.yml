project:
  type: website
  output-dir: docs
  resources:
    - images/**
resource-path:
  - images
  - .

website:
  title: "Micro-Remote Sensing"
  site-url: https://gisma-courses.github.io/LV-19-050-228
  repo-url: https://github.com/gisma-courses/LV-19-050-228
  repo-actions: []   # [source, issue, edit] bei Bedarf manuell setzen
  page-navigation: true
  bread-crumbs: false
  open-graph: true
  image: images/banner.png
  page-footer:
    center: |
      gisma spatial science ressources (<span class="year"></span>) —
      <a class="impressum-link" href="base/impressum.html">Impressum</a>

  search:
    location: navbar
    type: textbox

  navbar:
    background: primary
    foreground: light
    logo: images/logo.png
    left:
      - text: Modules
        href: modules.qmd       
      - text: Goals
        href: module-goals.qmd                
      - text: Materials
        href: materials.qmd
      - text: Activities
        href: activities.qmd
      - text: Assessments
        href: assessments.qmd
    right:
      - icon: question-square-fill
        text: FAQ
        href: base/faq.qmd    
      - icon: chat-left-text-fill
        text: "ILIAS"
        href: "https://ilias.uni-marburg.de/ilias.php?baseClass=ilrepositorygui&reloadpublic=1&cmd=&ref_id=1"

